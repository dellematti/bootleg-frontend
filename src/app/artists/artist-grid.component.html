<div class="artist-grid">
  <div class="artist-card" *ngFor="let artist of artists">
    <div class="image-wrapper">
      <img [src]="artist.imageUrl || 'assets/default-artist.png'" [alt]="artist.name" class="artist-img">
      <button class="play-btn">
        <svg viewBox="0 0 24 24" class="play-icon"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
    <div class="artist-info">
      <h3 class="artist-name">{{ artist.name }}</h3>
      <p class="artist-role">Artista</p>
    </div>
  </div>
</div>
