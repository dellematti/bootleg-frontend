<div class="login-viewport">
  <div class="login-ambient-glow"></div>

  <div class="login-card">
    
    <div class="card-header">
      <div class="mini-logo">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="9" width="2.8" height="6" rx="1.4" fill="#00c030"/>
          <rect x="8" y="5" width="2.8" height="14" rx="1.4" fill="#00c030"/>
          <rect x="13" y="2" width="2.8" height="20" rx="1.4" fill="#00c030"/>
          <rect x="18" y="7" width="2.8" height="10" rx="1.4" fill="#00c030"/>
        </svg>
        <span class="logo-text">Boot<span class="logo-accent">leg</span></span>
      </div>
      <h2>Bentornato nel pit</h2>
      <p class="subtitle">Accedi per gestire i tuoi eventi e tracciare i concerti.</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">
      
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            id="username"
            type="text"
            [(ngModel)]="request.username"
            name="username"
            placeholder="Inserisci username"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            type="password"
            [(ngModel)]="request.password"
            name="password"
            placeholder="Inserisci password"
            required
          />
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <span>⚠️</span> {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit">
        Login
      </button>

    </form>

    <div class="card-footer">
      <p>
        Non hai un account? 
        <a routerLink="/register" class="register-link">Registrati</a>
      </p>
    </div>

  </div>
</div>
